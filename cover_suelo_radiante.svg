<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0c0f"/>
      <stop offset="1" stop-color="#1a1230"/>
    </linearGradient>
    <linearGradient id="heat" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#ff5c5c"/>
      <stop offset="1" stop-color="#ffd56a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <!-- room -->
  <rect x="130" y="190" width="940" height="420" rx="26" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
  <!-- floor -->
  <rect x="170" y="470" width="860" height="110" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
  <!-- pipes -->
  <path d="M200 525 C280 490, 360 560, 440 525 S600 490, 680 525 S840 560, 1000 525"
        fill="none" stroke="url(#heat)" stroke-width="10" stroke-linecap="round" opacity="0.95"/>
  <path d="M200 555 C280 520, 360 590, 440 555 S600 520, 680 555 S840 590, 1000 555"
        fill="none" stroke="url(#heat)" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
  <!-- manifold -->
  <rect x="190" y="340" width="120" height="80" rx="16" fill="#6ea8ff" opacity="0.70"/>
  <rect x="205" y="360" width="90" height="12" rx="6" fill="#e9e9ef" opacity="0.85"/>
  <rect x="205" y="384" width="90" height="12" rx="6" fill="#e9e9ef" opacity="0.85"/>
  <!-- heat waves -->
  <g opacity="0.22" stroke="#ffd56a" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M380 445 C360 415, 400 395, 380 365"/>
    <path d="M520 445 C500 415, 540 395, 520 365"/>
    <path d="M660 445 C640 415, 680 395, 660 365"/>
    <path d="M800 445 C780 415, 820 395, 800 365"/>
  </g>
  <text x="60" y="110" fill="#e9e9ef" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="54" font-weight="700">Suelo radiante</text>
  <text x="60" y="170" fill="#b6b8c6" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="28">Dimensionamiento hidráulico · pérdidas · selección de bomba</text>
</svg>
